services:
  db:
    image: postgres:15-alpine
    container_name: academor_db
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - academor_net

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: academor_web
    env_file:
      - .env
    command: gunicorn academor.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60
    volumes:
      - ..:/app
      - ../academor/staticfiles:/app/academor/staticfiles  # collectstatic mount
      - ../academor/media:/app/academor/media               # media mount
    expose:
      - "8000"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DEBUG: ${DEBUG}
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      ADMIN_URL: ${ADMIN_URL}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - academor_net

  nginx:
    image: nginx:alpine
    container_name: academor_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
    - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    - /etc/letsencrypt:/etc/letsencrypt:ro
    - ../academor/staticfiles:/app/academor/staticfiles:ro
    - ../academor/media:/app/academor/media:ro
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - academor_net

volumes:
  postgres_data:

networks:
  academor_net: