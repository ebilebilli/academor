{% load i18n %}
<div class="container-xxl py-5">
    <div class="container">
        <div class="text-center wow fadeInUp mb-5" data-wow-delay="0.1s">
            <h1 class="mb-0">{% trans "Our Services" %}</h1>
        </div>
        {% if categories %}
        <div class="row g-4 service-highlights-grid">
            {% for cat in categories %}
            <div class="col-6 col-lg-3 wow fadeInUp" data-wow-delay="0.1s">
                <a href="{% url 'projects:course-detail' slug=cat.slug %}" class="svc-card-link">
                    <div class="svc-card">
                        {% if cat.image %}
                        <img
                            src="{{ cat.image }}"
                            alt="{{ cat.name }}"
                            class="svc-card__img"
                            loading="{% if forloop.counter <= 4 %}eager{% else %}lazy{% endif %}"
                            fetchpriority="{% if forloop.counter <= 4 %}high{% else %}auto{% endif %}"
                            decoding="async">
                        {% else %}
                        <div class="svc-card__img svc-card__img--placeholder"></div>
                        {% endif %}
                        <div class="svc-card__overlay"></div>
                        <div class="svc-card__body">
                            <h5 class="svc-card__title">{{ cat.name }}</h5>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
        {% else %}
        <div class="row g-4">
            <div class="col-12">
                <p class="text-center text-muted mb-0">{% trans "No categories yet." %}</p>
            </div>
        </div>
        {% endif %}
    </div>
</div>
