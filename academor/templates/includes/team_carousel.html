{% if team %}
<div class="position-relative team-carousel-wrap px-lg-1">
    <div class="owl-carousel owl-theme team-carousel">
        {% for member in team %}
        <div class="item">
            <div class="team-carousel-item-inner h-100">
                {% include "includes/team_member_card.html" %}
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% else %}
<div class="alert text-center mb-0" style="background-color: #fff3cd; border-color: #ffecb5; color: #8a6d3b;">
    No team members have been added yet.
</div>
{% endif %}
