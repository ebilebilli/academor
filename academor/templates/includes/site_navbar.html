{% load static %}
<nav class="navbar navbar-expand-lg bg-white navbar-light shadow sticky-top p-0">
    <a href="{% url 'projects:home-page' %}" class="navbar-brand d-flex align-items-center px-4 px-lg-5">
        <h2 class="m-0 text-primary"><i class="fa fa-book me-3"></i>Academor</h2>
    </a>
    <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarCollapse">
        <div class="navbar-nav ms-auto p-4 p-lg-0">
            <a href="{% url 'projects:home-page' %}" class="nav-item nav-link{% if nav_active == 'home' %} active{% endif %}">Home</a>
            <a href="{% url 'projects:about-page' %}" class="nav-item nav-link{% if nav_active == 'about' %} active{% endif %}">About</a>
            <a href="{% url 'projects:courses-page' %}" class="nav-item nav-link{% if nav_active == 'courses' %} active{% endif %}">Courses</a>
            <div class="nav-item dropdown">
                <a href="#" class="nav-link dropdown-toggle{% if nav_active == 'team' %} active{% endif %}" data-bs-toggle="dropdown">Pages</a>
                <div class="dropdown-menu fade-down m-0">
                    <a href="{% url 'projects:team-page' %}" class="dropdown-item{% if nav_active == 'team' %} active{% endif %}">Our Team</a>
                    <a href="{% url 'projects:reviews-page' %}" class="dropdown-item">Testimonial</a>
                    <a href="{% url 'projects:home-page' %}" class="dropdown-item">404 Page</a>
                </div>
            </div>
            <a href="{% url 'projects:tests-page' %}" class="nav-item nav-link{% if nav_active == 'tests' %} active{% endif %}">Test</a>
            <a href="{% url 'projects:contact-page' %}" class="nav-item nav-link{% if nav_active == 'contact' %} active{% endif %}">Contact</a>
            <div class="nav-item dropdown">
                <a href="#" class="nav-link dropdown-toggle d-flex align-items-center" data-bs-toggle="dropdown">
                    {% if language == 'az' %}
                    <img src="{% static 'assets/img/azerbaijan.png' %}" alt="AZ" style="width: 18px; height: 12px; object-fit: cover; margin-right: 6px;">AZ
                    {% elif language == 'ru' %}
                    <img src="{% static 'assets/img/russia.png' %}" alt="RU" style="width: 18px; height: 12px; object-fit: cover; margin-right: 6px;">RU
                    {% else %}
                    <img src="{% static 'assets/img/united-kingdom.png' %}" alt="EN" style="width: 18px; height: 12px; object-fit: cover; margin-right: 6px;">EN
                    {% endif %}
                </a>
                <div class="dropdown-menu fade-down m-0">
                    <a href="{% url 'set_language' %}?language=en&next={{ request.get_full_path|urlencode }}" class="dropdown-item d-flex align-items-center">
                        <img src="{% static 'assets/img/united-kingdom.png' %}" alt="EN" style="width: 18px; height: 12px; object-fit: cover; margin-right: 8px;">English
                    </a>
                    <a href="{% url 'set_language' %}?language=az&next={{ request.get_full_path|urlencode }}" class="dropdown-item d-flex align-items-center">
                        <img src="{% static 'assets/img/azerbaijan.png' %}" alt="AZ" style="width: 18px; height: 12px; object-fit: cover; margin-right: 8px;">Azərbaycan
                    </a>
                    <a href="{% url 'set_language' %}?language=ru&next={{ request.get_full_path|urlencode }}" class="dropdown-item d-flex align-items-center">
                        <img src="{% static 'assets/img/russia.png' %}" alt="RU" style="width: 18px; height: 12px; object-fit: cover; margin-right: 8px;">Русский
                    </a>
                </div>
            </div>
        </div>
        <a href="" class="btn btn-primary py-4 px-lg-5 d-none d-lg-block">Join Now<i class="fa fa-arrow-right ms-3"></i></a>
    </div>
</nav>
