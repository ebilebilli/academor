server {

    listen 80;
    server_name academor.az www.academor.az;
    return 301 https://$host$request_uri;
}

server {

    listen 443 ssl http2;
    server_name academor.az www.academor.az;

    ssl_certificate /etc/letsencrypt/live/academor.az/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/academor.az/privkey.pem;

    client_max_body_size 130M;

    # Restore real client IP when the request comes from Cloudflare (update ranges if CF changes).
    # https://www.cloudflare.com/ips/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss image/svg+xml;

    # Cheap 404 for common vulnerability scans (never hits Django / Gunicorn).
    # Allow /.well-known/* (ACME, app links, security.txt); block other dot-paths and WP/php probes.
    location ~* (^/\.(?!well-known/)|/wp-admin|/wp-includes|/wp-login\.php|/xmlrpc\.php|/phpmyadmin|/pma|/vendor/phpunit|/\.env$|/\.git) {
        access_log off;
        return 404;
    }

    # Static files
    location /static/ {
        alias /app/academor/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Media files
    location /media/ {
        alias /app/academor/media/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
        try_files $uri =404;
    }

    # DJANGO
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # After real_ip above, $remote_addr is the visitor when proxied through Cloudflare.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 120s;
        proxy_read_timeout 120s;
        proxy_redirect off;
    }
}